<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Users</title>
  <link href="/assets/css/layui.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <script src="/assets/js/layui.js"></script>
</head>
<body class="layui-fluid container-pd">
  <div class="layui-card card">
    <div class="layui-card-header">Users</div>
    <div class="layui-card-body">
      <table class="layui-hide" id="tblUsers" lay-filter="usersTable"></table>
      <script type="text/html" id="toolbarUsers">
        <div class="layui-btn-container">
          <div class="layui-inline" style="margin-right:8px;">
            <input id="uqInput" class="layui-input" placeholder="search username/email" style="width:220px;"/>
          </div>
          <button class="layui-btn layui-btn-sm" lay-event="search">Search</button>
          <button class="layui-btn layui-btn-sm" lay-event="add">Add</button>
        </div>
      </script>
    </div>
  </div>
  <script src="/assets/js/users_table.js"></script>
</body>
</html>
