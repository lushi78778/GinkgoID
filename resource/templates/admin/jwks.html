<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>JWKS</title>
  <link href="/assets/css/layui.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <script src="/assets/js/layui.js"></script>
</head>
<body class="layui-fluid container-pd">
  <h3>JWKS</h3>
  <div class="layui-card card">
    <div class="layui-card-header">JWKS</div>
    <div class="layui-card-body">
      <table class="layui-hide" id="tblJWKS" lay-filter="jwksTable"></table>
      <script type="text/html" id="toolbarJWKS">
        <div class="layui-btn-container">
          <button class="layui-btn layui-btn-sm" lay-event="rotALL">Rotate ALL</button>
          <button class="layui-btn layui-btn-sm" lay-event="rotRS">Rotate RS256</button>
          <button class="layui-btn layui-btn-sm" lay-event="rotES">Rotate ES256</button>
        </div>
      </script>
    </div>
  </div>
  <script src="/assets/js/jwks_table.js"></script>
</body>
</html>
