<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Sign in</title>
  <link href="/assets/css/layui.css" rel="stylesheet"/>
  <style>body{display:flex;align-items:center;justify-content:center;height:100vh;background:#f7f7f7} .card{width:360px;background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}</style>
  <script src="/assets/js/layui.js"></script>
</head>
<body>
  <div class="card">
    <h3 style="margin-bottom:16px;">Sign in</h3>
    <form class="layui-form" method="POST" action="/login">
      <div class="layui-form-item">
        <input type="text" name="username" required lay-verify="required" placeholder="username" autocomplete="username" class="layui-input">
      </div>
      <div class="layui-form-item">
        <input type="password" name="password" required lay-verify="required" placeholder="password" autocomplete="current-password" class="layui-input">
      </div>
      <input type="hidden" name="continue" value="{{.continue}}"/>
      <div class="layui-form-item">
        <button class="layui-btn layui-btn-fluid" lay-submit>Login</button>
      </div>
    </form>
    <div style="font-size:12px;color:#888;"> <a href="{{.privacy_url}}" target="_blank">隐私政策</a> · <a href="{{.terms_url}}" target="_blank">用户协议</a> </div>
  </div>
</body>
</html>
